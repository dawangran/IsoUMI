name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libhts-dev libcurl4-openssl-dev zlib1g-dev libbz2-dev liblzma-dev

      - name: Build
        run: make

      - name: Test
        run: make test
